<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 오버월드</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2563eb;--primary-light:#eff6ff;--primary-mid:#60a5fa;
  --bg:#f5f5f7;--surface:#ffffff;--border:#e2e2e8;--border-dark:#c8c8d0;
  --text:#1a1a2e;--text-sub:#6b6b80;--text-muted:#a0a0b0;--accent:#e11d48;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --sidebar-w:200px;--header-h:52px;--img-banner-h:120px;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;font-weight:400;line-height:1.6;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:var(--sans);}
input,textarea,select{font-family:var(--sans);}
#header{position:sticky;top:0;left:0;right:0;z-index:200;height:var(--header-h);background:linear-gradient(90deg,#1e40af 0%,#2563eb 50%,#60a5fa 100%);display:flex;align-items:center;padding:0 1.5rem;gap:1.5rem;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
#img-banner{display:block;width:100%;height:var(--img-banner-h);background:url('https://i.imgur.com/FX10Gkj.png') center/cover no-repeat;cursor:pointer;}#layout{padding-top:0;}#sidebar{top:var(--header-h);}.header-logo{font-family:var(--serif);font-size:1.2rem;font-weight:700;color:#fff;letter-spacing:-0.01em;white-space:nowrap;}
.header-search{flex:1;max-width:360px;display:flex;}
.header-search input{flex:1;border:none;outline:none;padding:0.4rem 0.75rem;font-size:13px;background:rgba(255,255,255,0.15);color:#fff;border-radius:2px 0 0 2px;}
.header-search input::placeholder{color:rgba(255,255,255,0.6);}
.header-search button{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:0.4rem 0.75rem;font-size:13px;border-radius:0 2px 2px 0;transition:background 0.15s;}
.header-search button:hover{background:rgba(255,255,255,0.3);}
.header-nav{display:flex;gap:0.25rem;margin-left:auto;}
.header-nav a,.header-nav button{color:rgba(255,255,255,0.85);background:none;border:none;font-size:13px;padding:0.35rem 0.75rem;border-radius:2px;transition:all 0.15s;white-space:nowrap;}
.header-nav a:hover,.header-nav button:hover{background:rgba(255,255,255,0.15);color:#fff;}
.header-nav .btn-join{background:#fff;color:var(--primary);font-weight:500;}
.header-nav .btn-join:hover{background:#eff6ff;}
#layout{display:flex;padding-top:var(--header-h);min-height:100vh;}
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));overflow-y:auto;align-self:flex-start;}
.cafe-profile{padding:1.25rem 1rem;border-bottom:1px solid var(--border);text-align:center;}
.cafe-thumb{width:64px;height:64px;background:var(--primary-light);border-radius:50%;margin:0 auto 0.6rem;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--primary);}
.cafe-name{font-family:var(--serif);font-weight:700;font-size:0.95rem;color:var(--text);}
.cafe-stats{display:flex;justify-content:center;gap:1rem;margin-top:0.5rem;font-size:11px;color:var(--text-sub);}
.cafe-stat-num{font-weight:700;color:var(--primary);}
.sidebar-menu-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.06em;padding:0.75rem 1rem 0.3rem;}
.sidebar-menu{list-style:none;}
.sidebar-menu li a{display:flex;align-items:center;justify-content:space-between;padding:0.45rem 1rem;font-size:13px;color:var(--text-sub);transition:all 0.12s;border-left:2px solid transparent;}
.sidebar-menu li a:hover{background:var(--bg);color:var(--text);}
.sidebar-menu li a.active{background:var(--primary-light);color:var(--primary);font-weight:500;border-left-color:var(--primary);}
.sidebar-menu .count{font-size:11px;color:var(--text-muted);background:var(--bg);padding:0.05rem 0.4rem;border-radius:10px;}
#main{flex:1;padding:1.5rem;max-width:900px;}
.btn{display:inline-flex;align-items:center;border:none;border-radius:2px;font-size:13px;font-weight:500;padding:0.4rem 1rem;transition:all 0.15s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#1d4ed8;}
.btn-outline{background:none;border:1px solid var(--border-dark);color:var(--text-sub);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{padding:0.25rem 0.65rem;font-size:12px;}
.board-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.board-title{font-family:var(--serif);font-size:1.05rem;font-weight:700;color:var(--text);border-left:3px solid var(--primary);padding-left:0.6rem;}
.post-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);}
.post-table thead th{background:#f9f9fb;border-bottom:1px solid var(--border);padding:0.5rem 0.75rem;font-size:12px;font-weight:500;color:var(--text-sub);text-align:left;white-space:nowrap;}
.post-table tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
.post-table tbody tr:last-child{border-bottom:none;}
.post-table tbody tr:hover{background:#fafafa;}
.post-table td{padding:0.55rem 0.75rem;font-size:13px;}
.td-num{color:var(--text-muted);width:44px;text-align:center;font-size:12px;}
.td-cat{width:72px;}
.td-title{color:var(--text);}
.td-title a:hover{color:var(--primary);text-decoration:underline;}
.td-cmt{color:var(--accent);font-size:12px;padding-left:0.2rem;}
.td-author{width:80px;color:var(--text-sub);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.td-date{width:68px;color:var(--text-muted);font-size:12px;white-space:nowrap;}
.td-views{width:44px;color:var(--text-muted);font-size:12px;text-align:right;}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:0.1rem 0.4rem;border-radius:2px;}
.badge-recruit{background:#eff6ff;color:var(--primary);}
.badge-oc{background:#dcfce7;color:#166534;}
.badge-free{background:#f3f4f6;color:#6b7280;}
.badge-notice{background:#fee2e2;color:#991b1b;}
.badge-closed{background:#f3f4f6;color:#9ca3af;}
tr.pinned{background:#fefce8;}
tr.pinned:hover{background:#fef9c3;}
.pagination{display:flex;justify-content:center;align-items:center;gap:0.2rem;margin-top:1rem;}
.page-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);font-size:12px;color:var(--text-sub);border-radius:2px;transition:all 0.12s;}
.page-btn:hover{border-color:var(--primary);color:var(--primary);}
.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.form-row{margin-bottom:0.85rem;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text-sub);margin-bottom:0.3rem;}
.form-input,.form-select,.form-textarea{width:100%;border:1px solid var(--border-dark);border-radius:2px;padding:0.45rem 0.65rem;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,0.1);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);}
.form-textarea{resize:vertical;line-height:1.65;}
</style>

  <style>
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg);
    }

    .auth-logo {
      text-align: center; margin-bottom: 1.5rem;
    }
    .auth-logo a {
      font-family: var(--serif); font-size: 1.75rem; font-weight: 700;
      color: var(--primary);
    }
    .auth-logo p { font-size: 12px; color: var(--text-muted); margin-top: 0.2rem; }

    .auth-box {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .auth-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none; border: none;
      padding: 0.75rem; font-size: 13px; font-weight: 500;
      color: var(--text-muted); transition: all 0.15s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:not(.active):hover { background: var(--bg); color: var(--text-sub); }

    .auth-panel { padding: 1.5rem; display: none; }
    .auth-panel.active { display: block; }

    .oauth-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      background: var(--surface); border: 1px solid var(--border-dark);
      color: var(--text); font-size: 13px;
      padding: 0.55rem; border-radius: 2px; margin-bottom: 0.4rem;
      transition: all 0.15s;
    }
    .oauth-btn:hover { background: var(--bg); border-color: var(--primary); }

    .divider {
      display: flex; align-items: center; gap: 0.5rem;
      margin: 1rem 0; color: var(--text-muted); font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 0.25rem; }

    .btn-full {
      width: 100%; background: var(--primary); border: none;
      color: #fff; font-size: 14px; font-weight: 700;
      padding: 0.65rem; border-radius: 2px; margin-top: 0.25rem;
      transition: background 0.15s;
    }
    .btn-full:hover { background: #1d4ed8; }

    .auth-footer {
      text-align: center; margin-top: 1rem;
      font-size: 12px; color: var(--text-muted);
    }
    .auth-footer a { color: var(--primary); }

    .terms { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 0.75rem; line-height: 1.6; }
    .terms a { color: var(--text-sub); }

    .back-link {
      margin-top: 1rem; font-size: 12px; color: var(--text-muted);
    }
    .back-link a { color: var(--primary); }
  </style>
</head>
<body>

  <div class="auth-logo">
    <a href="index.html">오버월드</a>
    <p>자캐 역극 커뮤니티</p>
  </div>

  <div class="auth-box">
    <div class="auth-tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">회원가입</button>
    </div>

    <!-- 로그인 -->
    <div class="auth-panel active" id="panel-login">
      <button class="oauth-btn">
        <span>G</span> Google로 로그인
      </button>

      <div class="divider">또는</div>

      <div class="form-row">
        <label class="form-label">이메일</label>
        <input class="form-input" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-row">
        <label class="form-label">비밀번호</label>
        <input class="form-input" type="password" placeholder="비밀번호" />
      </div>

      <button class="btn-full" onclick="location.href='index.html'">로그인</button>

      <div class="auth-footer">
        <a href="#">비밀번호를 잊으셨나요?</a>
      </div>
    </div>

    <!-- 회원가입 -->
    <div class="auth-panel" id="panel-register">
      <button class="oauth-btn">
        <span>G</span> Google로 가입하기
      </button>

      <div class="divider">또는</div>

      <div class="form-row">
        <label class="form-label">이메일</label>
        <input class="form-input" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-row">
        <label class="form-label">닉네임</label>
        <input class="form-input" type="text" placeholder="2~20자" maxlength="20" />
        <div class="form-hint">특수문자 불가</div>
      </div>
      <div class="form-row">
        <label class="form-label">비밀번호</label>
        <input class="form-input" type="password" placeholder="8자 이상" />
      </div>
      <div class="form-row">
        <label class="form-label">비밀번호 확인</label>
        <input class="form-input" type="password" placeholder="비밀번호 재입력" />
      </div>

      <button class="btn-full">가입하기</button>

      <div class="terms">
        가입 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다.
      </div>
    </div>
  </div>

  <div class="back-link"><a href="index.html">← 메인으로</a></div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }
</script>
</body>
</html>
